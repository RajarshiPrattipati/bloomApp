<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- mobile hypercasual: lock zoom, fill the notch, one-thumb portrait -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover"
    />
